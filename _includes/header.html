<header class="site-header">
  <div class="container header-inner">
    <div class="brand">
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <p>{{ site.description }}</p>
    </div>
    <nav class="site-nav" aria-label="Primary">
      {% for item in site.nav %}
        {% assign current = page.url == item.url %}
        <a href="{{ item.url | relative_url }}"{% if current %} aria-current="page"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
    <button
      id="theme-toggle"
      class="theme-toggle"
      aria-label="Toggle light/dark mode"
      title="Toggle light/dark mode"
    >
      <span class="toggle-icon" aria-hidden="true" id="theme-icon">🌙</span>
      <div class="toggle-track" aria-hidden="true">
        <div class="toggle-knob"></div>
      </div>
    </button>
  </div>
</header>
