<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
<link rel="shortcut icon" type="image/png" href="{{ '/assets/images/logo.png' | relative_url }}?v=2">
<link rel="apple-touch-icon" href="{{ '/assets/images/logo.png' | relative_url }}?v=2">
<!-- Theme: run before paint to prevent flash -->
<script>
  (function () {
    var stored = localStorage.getItem('theme');
    // Default to dark mode if no preference has been saved
    var theme = stored ? stored : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
