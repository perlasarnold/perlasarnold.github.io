---
layout: default
---
<article class="post-page container">
  <header class="post-header">
    <p class="eyebrow">Article</p>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%B %-d, %Y" }}</span>
      <span>By {{ site.author.name }}</span>
      {% if page.tags %}
        <span>{{ page.tags | join: ", " }}</span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
