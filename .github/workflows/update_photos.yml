name: Update Amazon Photos

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger from github UI

permissions:
  contents: write

jobs:
  update-photos:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Latest Photos from Amazon
        run: python amazon_scraper.py

      - name: Generate photo tags
        run: python generate_tags.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: dynamically update amazon photos gallery"
          file_pattern: "_data/photos.json _data/photo_tags.json"
