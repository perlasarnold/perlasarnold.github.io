name: intune-feed-publish

# Phase 2: Content Assembly & Deployment — runs at 12:00 PM Pacific Time every weekday
# Reads the raw JSON from Phase 1, assembles a polished Jekyll post,
# and commits it to trigger a GitHub Pages rebuild.

on:
  schedule:
    # 12:00 PM PT = 19:00 UTC (PDT, UTC-7) / 20:00 UTC (PST, UTC-8)
    # Using PDT (summer) offset — GitHub Actions uses UTC
    - cron: '0 19 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # Ensure we get the latest commit (including Phase 1 data)

      - name: Verify scraper data exists
        run: |
          if [ ! -f _data/intune_feed_raw.json ]; then
            echo "::error::No scraper data found at _data/intune_feed_raw.json"
            echo "Phase 1 (intune-feed-scrape) must run first to generate data."
            exit 1
          fi
          echo "Found scraper data:"
          echo "  File size: $(stat -c%s _data/intune_feed_raw.json) bytes"
          echo "  Generated: $(python3 -c "import json; print(json.load(open('_data/intune_feed_raw.json'))['generated_utc'])")"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r src/intune_feed/requirements.txt

      - name: Run assembler (Phase 2)
        run: python -m src.intune_feed.assembler

      - name: Commit and push post
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts/ _data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: intune daily intel $(date -u +'%Y-%m-%d')"
          git push origin HEAD:main
