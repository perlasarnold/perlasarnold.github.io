name: intune-feed-scrape

# Phase 1: Data Collection — runs at 6:00 AM Pacific Time every weekday
# Fetches data from RSS feeds, Reddit, and news sources,
# classifies items by severity, and commits raw JSON data.

on:
  schedule:
    # 6:00 AM PT = 13:00 UTC (PDT, UTC-7) / 14:00 UTC (PST, UTC-8)
    # Using PDT (summer) offset — GitHub Actions uses UTC
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Hours of source history to include'
        required: false
        default: '25'

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r src/intune_feed/requirements.txt

      - name: Run scraper (Phase 1)
        env:
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '25' }}
        run: python -m src.intune_feed.scraper

      - name: Commit raw data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/intune_feed_raw.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: intune feed scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:main
